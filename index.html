<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embroidery Generator</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
}

.controls {
  width: 320px;
  padding: 20px;
  background: #eee;
}

canvas {
  flex: 1;
  background: transparent; /* ✅ 透明 */
}

label {
  display: block;
  margin-top: 12px;
}

input[type="range"], select {
  width: 100%;
}
</style>
</head>

<body>

<div class="controls">
  <h3>パターン設定</h3>

  <label>ライン数 <input type="range" id="lines" min="5" max="40" value="20"></label>
  <label>ポイント数 <input type="range" id="steps" min="5" max="30" value="15"></label>
  <label>移動量 <input type="range" id="stepSize" min="10" max="80" value="40"></label>
  <label>曲がり <input type="range" id="curve" min="0" max="100" value="70"></label>
  <label>帯の太さ <input type="range" id="width" min="4" max="30" value="12"></label>

  <label>キャンバス
    <select id="size">
      <option value="70">70mm</option>
      <option value="100" selected>100mm</option>
    </select>
  </label>

  <label>色1 <input type="color" id="c1" value="#c86ba4"></label>
  <label>色2 <input type="color" id="c2" value="#aa92e6"></label>
  <label>色3 <input type="color" id="c3" value="#42533e"></label>

  <button onclick="next()">再生成</button>
  <button onclick="exportSVG()">SVG</button>
</div>

<canvas id="canvas" width="800" height="800"></canvas>

<script>
let seed = 1;
let shapes = [];

function rand() {
  seed = (seed * 9301 + 49297) % 233280;
  return seed / 233280;
}

function generateCurve(n, step, smooth) {
  let x = rand()*700+50;
  let y = rand()*700+50;
  let angle = rand()*Math.PI*2;

  let pts = [[x,y]];

  for(let i=0;i<n;i++){
    angle += (rand()-0.5)*(1.5 - smooth/100);
    x += Math.cos(angle)*step*(0.5+rand());
    y += Math.sin(angle)*step*(0.5+rand());

    x = Math.max(50,Math.min(750,x));
    y = Math.max(50,Math.min(750,y));

    pts.push([x,y]);
  }
  return pts;
}

function expand(points, w){
  let L=[], R=[];
  for(let i=0;i<points.length;i++){
    let p0 = points[Math.max(0,i-1)];
    let p1 = points[Math.min(points.length-1,i+1)];
    let dx = p1[0]-p0[0];
    let dy = p1[1]-p0[1];
    let len = Math.sqrt(dx*dx+dy*dy)||1;

    let nx = -dy/len;
    let ny = dx/len;

    L.push([points[i][0]+nx*w, points[i][1]+ny*w]);
    R.push([points[i][0]-nx*w, points[i][1]-ny*w]);
  }
  return L.concat(R.reverse());
}

function drawShape(ctx, pts, color){
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);

  for(let i=1;i<pts.length-1;i++){
    let xc=(pts[i][0]+pts[i+1][0])/2;
    let yc=(pts[i][1]+pts[i+1][1])/2;
    ctx.quadraticCurveTo(pts[i][0],pts[i][1],xc,yc);
  }

  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
}

function generate(){
  let ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,800,800); // ✅ 没有背景填充

  let lines = +linesEl.value;
  let steps = +stepsEl.value;
  let size = +stepSizeEl.value;
  let smooth = +curveEl.value;
  let w = +widthEl.value;

  let colors=[c1.value,c2.value,c3.value];

  shapes=[];

  for(let i=0;i<lines;i++){
    let center = generateCurve(steps,size,smooth);
    let outline = expand(center,w/2);

    shapes.push({
      pts:outline,
      color:colors[i%colors.length]
    });

    drawShape(ctx,outline,colors[i%colors.length]);
  }
}

function next(){
  seed++;
  generate();
}

function exportSVG(){
  let mm = sizeEl.value;

  let svg=`<svg xmlns="http://www.w3.org/2000/svg"
  width="${mm}mm" height="${mm}mm"
  viewBox="0 0 800 800">`;

  shapes.forEach(s=>{
    let d=`M ${s.pts[0][0]} ${s.pts[0][1]}`;
    for(let i=1;i<s.pts.length;i++){
      d+=` L ${s.pts[i][0]} ${s.pts[i][1]}`;
    }
    d+=" Z";

    svg+=`<path d="${d}" fill="${s.color}"/>`;
  });

  svg+="</svg>";

  let blob=new Blob([svg],{type:"image/svg+xml"});
  let url=URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="pattern.svg";
  a.click();

  URL.revokeObjectURL(url);
}

const canvas=document.getElementById("canvas");
const linesEl=document.getElementById("lines");
const stepsEl=document.getElementById("steps");
const stepSizeEl=document.getElementById("stepSize");
const curveEl=document.getElementById("curve");
const widthEl=document.getElementById("width");
const sizeEl=document.getElementById("size");
const c1=document.getElementById("c1");
const c2=document.getElementById("c2");
const c3=document.getElementById("c3");

document.querySelectorAll("input,select").forEach(e=>{
  e.addEventListener("input",generate);
});

generate();
</script>

</body>
</html>
